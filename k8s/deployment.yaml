apiVersion: apps/v1
kind: Deployment
metadata:
  name: notifications-api
spec:
  replicas: 2
  selector:
    matchLabels:
      app: notifications-api
  template:
    metadata:
      labels:
        app: notifications-api
    spec:
      containers:
      - name: notifications-api
        image: techgabriel/notifications-api:latest
        ports:
          - containerPort: 8082
        envFrom:
          - configMapRef:
              name: notifications-api-config
          - secretRef:
              name: notifications-api-secret